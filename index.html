<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Cazando - Edición Arcade</title>
  <link rel="stylesheet" href="cazando.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciarJuego();">
  
  <div class="game-container">
    <header>
      <h1>CAZANDO</h1>
      <p class="autor">INSERT COIN - MATIAS VILLOTA</p>
    </header>

    <div class="panel">
      <div class="marcador">
        <span>SCORE: <span id="puntos" class="valor">0</span></span>
      </div>
      <div class="marcador">
        <span>TIME: <span id="tiempo" class="valor">10</span></span>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="areaJuego" width="500" height="500"></canvas>
      
      <div id="pantallaFinal" class="modal oculto">
        <h2 id="tituloModal">GAME OVER</h2>
        <button class="btn-retro" onclick="reiniciar(); ocultarModal();">INSERT COIN TO RETRY</button>
      </div>
    </div>

    <div class="menu-acciones">
        <button class="btn-retro btn-reiniciar" onclick="reiniciar();">REINICIAR PARTIDA</button>
    </div>

    <div class="controles-dpad">
      <button class="btn-dir btn-arriba" onclick="moverArriba();">⬆</button>
      <div class="fila-medio">
        <button class="btn-dir" onclick="moverIzquierda();">⬅</button>
        <button class="btn-dir" onclick="moverAbajo();">⬇</button>
        <button class="btn-dir" onclick="moverDerecha();">➡</button>
      </div>
    </div>

    <p id="mensaje"></p>
  </div>

  <script src="cazando.js"></script>
  <script>
    function mostrarModal(mensaje) {
        document.getElementById('tituloModal').innerText = mensaje;
        document.getElementById('pantallaFinal').classList.remove('oculto');
    }
    function ocultarModal() {
        document.getElementById('pantallaFinal').classList.add('oculto');
    }
  </script>
</body>
</html>
