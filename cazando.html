<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciarJuego();">
  
  <div class="game-container">
    <header>
      <h1>Juego Cazando</h1>
      <p class="autor">Por: Matias Villota</p>
    </header>

    <div class="panel">
      <div class="marcador">
        <span>Puntos: <span id="puntos" class="valor">0</span></span>
      </div>
      <div class="marcador">
        <span>Tiempo: <span id="tiempo" class="valor">10</span></span>
      </div>
    </div>

    <canvas id="areaJuego" width="500" height="500"></canvas>

    <div class="controles-dpad">
      <button class="btn-arriba" onclick="moverArriba();">⬆</button>
      <div class="fila-medio">
        <button onclick="moverIzquierda();">⬅</button>
        <button onclick="moverAbajo();">⬇</button>
        <button onclick="moverDerecha();">➡</button>
      </div>
    </div>

    <p id="mensaje"></p>
  </div>

  <script src="cazando.js"></script>
</body>
</html>
